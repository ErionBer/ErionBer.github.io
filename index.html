<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Erion Berisha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .tab-btn.active { color: #2563eb; border-bottom: 2px solid #2563eb; background-color: #eff6ff; }
        .tab-btn { color: #64748b; border-bottom: 2px solid transparent; }
        .fade-enter { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: flex; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <div id="admin-bar" class="bg-red-600 text-white p-2 text-center text-sm font-bold hidden justify-between items-center px-4 shadow-lg z-50">
        <span>🔧 MODE ÉDITION ACTIVÉ</span>
        <button onclick="downloadUpdatedHTML()" class="bg-white text-red-600 px-3 py-1 rounded hover:bg-red-50 transition text-xs flex items-center gap-2 font-bold">
            <i data-lucide="save" class="w-3 h-3"></i> Sauvegarder & Télécharger
        </button>
    </div>

    <nav class="bg-white shadow-sm border-b border-gray-200 z-10 flex-none">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center h-auto md:h-16 py-2 md:py-0">
                <div class="font-bold text-xl text-slate-900 tracking-tight mb-2 md:mb-0" id="nav-name">Portfolio</div>
                
                <div class="flex items-center space-x-2 md:space-x-4">
                    <div class="flex border-r border-gray-200 pr-2 md:pr-4 mr-2">
                        <button onclick="switchTab('projects')" id="btn-projects" class="tab-btn px-3 py-2 rounded-t-lg text-sm font-semibold transition active" data-i18n="navProjects">Projets</button>
                        <button onclick="switchTab('skills')" id="btn-skills" class="tab-btn px-3 py-2 rounded-t-lg text-sm font-semibold transition" data-i18n="navSkills">Compétences</button>
                        <button onclick="switchTab('profile')" id="btn-profile" class="tab-btn px-3 py-2 rounded-t-lg text-sm font-semibold transition" data-i18n="navProfile">Profil</button>
                    </div>
                    <button onclick="toggleLang()" class="bg-slate-100 hover:bg-slate-200 px-3 py-1 rounded-full text-xs font-bold transition flex items-center gap-1 border border-slate-300">
                        <i data-lucide="languages" class="w-3 h-3"></i>
                        <span id="lang-label">EN</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto bg-slate-50 p-4 md:p-8 relative">
        <div class="max-w-5xl mx-auto min-h-full">

            <section id="tab-projects" class="fade-enter block">
                <div class="mb-6 flex justify-between items-end">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-900" data-i18n="projTitle">Mes Réalisations</h2>
                        <p class="text-slate-500" data-i18n="projSub">Explorer mes projets récents.</p>
                    </div>
                    <button onclick="openEditModal()" class="admin-only bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm shadow flex items-center gap-2 transition">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> <span data-i18n="addProj">Ajouter un projet</span>
                    </button>
                </div>
                <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <section id="tab-skills" class="fade-enter hidden">
                <div class="mb-6 flex justify-between items-end">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-900" data-i18n="navSkills">Expertise Technique</h2>
                    </div>
                    <button onclick="addSkill()" class="admin-only bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm shadow flex items-center gap-2 transition">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> <span data-i18n="addSkill">Ajouter</span>
                    </button>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                    <div id="skills-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
            </section>

            <section id="tab-profile" class="fade-enter hidden">
                <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden relative">
                    <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-700"></div>
                    <div class="px-8 pb-8">
                        <div class="relative flex justify-between items-end -mt-12 mb-6">
                            <img id="profile-img-large" src="" class="w-24 h-24 rounded-full border-4 border-white shadow-md bg-white object-cover">
                            <div class="flex gap-2">
                                <a id="profile-linkedin" href="#" target="_blank" class="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition shadow"><i data-lucide="linkedin" class="w-5 h-5"></i></a>
                                <a id="profile-cv" href="#" target="_blank" class="bg-emerald-600 text-white p-2 rounded-lg hover:bg-emerald-700 transition shadow" title="Télécharger CV"><i data-lucide="file-text" class="w-5 h-5"></i></a>
                                <a id="profile-email-btn" href="" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm hover:bg-slate-800 transition shadow font-bold" data-i18n="contactMe">Me contacter</a>
                            </div>
                        </div>
                        <div class="mb-8">
                            <h1 id="profile-name-large" class="text-3xl font-extrabold text-slate-900"></h1>
                            <p id="profile-role-large" class="text-lg text-blue-600 font-medium mb-4"></p>
                            <p id="profile-bio-large" class="text-slate-600 leading-relaxed"></p>
                        </div>
                        <div class="bg-slate-50 rounded-xl p-6 border border-slate-200 flex flex-col md:flex-row items-center gap-6">
                            <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-100 shrink-0">
                                <img id="qr-code-final" src="" class="w-32 h-32" alt="QR Code">
                            </div>
                            <div class="text-center md:text-left">
                                <h3 class="font-bold text-slate-900 text-lg mb-1" data-i18n="sharePort">Partager mon Portfolio</h3>
                                <p class="text-sm text-slate-500 mb-3" data-i18n="shareDesc">Voici le QR Code qui mène vers ce site.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-4 mt-auto">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center text-xs text-slate-400">
            <p>© 2024 Erion Berisha</p>
            <button onclick="toggleAdmin()" class="text-slate-300 hover:text-slate-600 transition p-2"><i data-lucide="lock" class="w-3 h-3"></i></button>
        </div>
    </footer>

    <div id="project-modal" class="fixed inset-0 z-40 hidden">
        <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
            <div class="bg-white w-full max-w-2xl max-h-[85vh] overflow-y-auto rounded-2xl shadow-2xl pointer-events-auto flex flex-col relative">
                <div class="relative h-48 sm:h-64 shrink-0">
                    <img id="modal-image" src="" class="w-full h-full object-cover">
                    <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 text-white p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="p-6 md:p-8">
                    <span id="modal-tag" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded mb-3 inline-block uppercase"></span>
                    <h3 id="modal-title" class="text-2xl font-bold text-slate-900 mb-4"></h3>
                    <p id="modal-desc" class="text-slate-600 whitespace-pre-line mb-6"></p>
                    <div id="modal-techs" class="flex flex-wrap gap-2 mb-8"></div>
                    <div class="flex gap-3">
                        <a id="modal-btn-demo" href="#" target="_blank" class="flex-1 bg-blue-600 text-white text-center py-3 rounded-xl font-semibold hover:bg-blue-700 transition" data-i18n="view">Voir</a>
                        <a id="modal-btn-code" href="#" target="_blank" class="flex-1 bg-slate-100 text-slate-700 text-center py-3 rounded-xl font-semibold hover:bg-slate-200 transition">Code</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center font-bold">
                    <h3>Éditer / Ajouter un projet</h3>
                    <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="p-6 overflow-y-auto space-y-4 text-sm">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block font-bold text-gray-500 mb-1">Titre (FR)</label>
                            <input type="text" id="edit-title-fr" class="w-full border p-2 rounded outline-none focus:ring-1 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-500 mb-1">Title (EN)</label>
                            <input type="text" id="edit-title-en" class="w-full border p-2 rounded">
                        </div>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-500 mb-1">Image URL</label>
                        <input type="text" id="edit-image" class="w-full border p-2 rounded">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block font-bold text-gray-500 mb-1">Catégorie (FR)</label>
                            <input type="text" id="edit-cat-fr" class="w-full border p-2 rounded">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-500 mb-1">Category (EN)</label>
                            <input type="text" id="edit-cat-en" class="w-full border p-2 rounded">
                        </div>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-500 mb-1">Description (FR)</label>
                        <textarea id="edit-desc-fr" class="w-full border p-2 rounded h-20"></textarea>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-500 mb-1">Description (EN)</label>
                        <textarea id="edit-desc-en" class="w-full border p-2 rounded h-20"></textarea>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-500 mb-1">Techs (virgules)</label>
                        <input type="text" id="edit-tech" class="w-full border p-2 rounded">
                    </div>
                </div>
                <div class="p-4 border-t border-gray-100 flex justify-end gap-2 bg-gray-50 rounded-b-xl">
                    <button onclick="closeEditModal()" class="px-4 py-2 text-gray-600">Annuler</button>
                    <button onclick="saveProject()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 shadow">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script id="data-script">
        let currentLang = 'fr';
        let isAdmin = false;

        let DATA = {
            info: {
                name: "Erion Berisha",
                // Remplace 'ma-photo.jpg' par le vrai nom de ton image (ex: 'photo_erion.png')
                photo: "ma-photo.png", 
                email: "erion.berisha@exemple.com",
                siteUrl: "https://mon-portfolio.com",
                linkedin: "https://www.linkedin.com/in/erion-berisha-448125333",
                fr: { 
                    title: "Étudiant en 2ème année BUT Science des Données", 
                    bio: "Passionné par l'informatique et les statistiques, je transforme les données en indicateurs de performance.",
                    // Mets ici le nom de ton fichier CV en français
                    cvPdf: "CV.pdf" 
                },
                en: { 
                    title: "2nd Year Data Science Student", 
                    bio: "Passionate about computer science and statistics, I transform data into performance indicators.",
                    // Mets ici le nom de ton fichier CV en anglais
                    cvPdf: "CV_anglais.pdf" 
                }
            },
            skills: [
                { name: "Python / R", level: "Expert" },
                { name: "SQL", level: "Avancé" },
                { name: "HTML5 / CSS3", level: "Expert" }
            ],
            projects: [
                {
                    id: 1,
                    image: "https://images.unsplash.com/photo-1592210454359-9043f067919b?fit=crop&w=800&h=400",
                    tech: ["React", "API", "Tailwind"],
                    linkDemo: "#", linkCode: "#",
                    fr: { title: "Application Météo", cat: "Web App", desc: "Développement d'une application avec l'API OpenWeather.", short: "App météo temps réel." },
                    en: { title: "Weather App", cat: "Web App", desc: "Developing a weather application with OpenWeather API.", short: "Real-time weather app." }
                }
            ]
        };

        const i18n = {
            fr: {
                navProjects: "Projets", navSkills: "Compétences", navProfile: "Profil",
                projTitle: "Mes Réalisations", projSub: "Explorer mes projets récents.",
                addProj: "Ajouter un projet", addSkill: "Ajouter",
                contactMe: "Me contacter", sharePort: "Partager mon Portfolio",
                shareDesc: "Voici le QR Code qui mène vers ce site.", view: "Voir"
            },
            en: {
                navProjects: "Projects", navSkills: "Skills", navProfile: "Profile",
                projTitle: "My Work", projSub: "Exploring my recent projects.",
                addProj: "Add Project", addSkill: "Add Skill",
                contactMe: "Contact Me", sharePort: "Share my Portfolio",
                shareDesc: "Here is the QR Code leading to this site.", view: "View"
            }
        };
        // FIN ZONE DE DONNÉES
    </script>

    <script>
        function toggleLang() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            document.getElementById('lang-label').textContent = currentLang === 'fr' ? 'EN' : 'FR';
            render();
        }

        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.body.classList.toggle('admin-mode', isAdmin);
            document.getElementById('admin-bar').classList.toggle('hidden', !isAdmin);
            document.getElementById('admin-bar').classList.toggle('flex', isAdmin);
            render();
        }

        function switchTab(tabName) {
            ['projects', 'skills', 'profile'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.remove('active');
            });
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            document.getElementById(`btn-${tabName}`).classList.add('active');
        }

        function render() {
            // Traduction Statique
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.textContent = i18n[currentLang][el.dataset.i18n];
            });

            // Profil
            document.getElementById('nav-name').textContent = DATA.info.name;
            document.getElementById('profile-name-large').textContent = DATA.info.name;
            document.getElementById('profile-role-large').textContent = DATA.info[currentLang].title;
            document.getElementById('profile-bio-large').textContent = DATA.info[currentLang].bio;
            
            // Photo & Liens
            document.getElementById('profile-img-large').src = DATA.info.photo;
            document.getElementById('profile-email-btn').href = `mailto:${DATA.info.email}`;
            document.getElementById('profile-linkedin').href = DATA.info.linkedin;
            
            // Lien CV Dynamique selon la langue
            document.getElementById('profile-cv').href = DATA.info[currentLang].cvPdf;
            
            // QR Code
            document.getElementById('qr-code-final').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`;

            // Compétences
            document.getElementById('skills-list').innerHTML = DATA.skills.map((s, idx) => `
                <div class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg flex items-center justify-between group">
                    <div class="flex flex-col">
                        <input onchange="editSkill(${idx}, 'name', this.value)" class="font-bold text-slate-700 bg-transparent outline-none focus:text-blue-600" value="${s.name}" ${!isAdmin ? 'readonly' : ''}>
                        <input onchange="editSkill(${idx}, 'level', this.value)" class="text-xs text-slate-400 bg-transparent outline-none uppercase font-semibold" value="${s.level}" ${!isAdmin ? 'readonly' : ''}>
                    </div>
                    ${isAdmin ? `<button onclick="removeSkill(${idx})" class="text-red-400 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                </div>
            `).join('');

            // Projets
            document.getElementById('projects-grid').innerHTML = DATA.projects.map(p => `
                <div class="bg-white rounded-xl border border-slate-100 shadow-sm hover:shadow-xl transition-all overflow-hidden flex flex-col relative group">
                    <div class="admin-only absolute top-2 right-2 z-10 gap-2">
                        <button onclick="openEditModal(${p.id}); event.stopPropagation();" class="bg-blue-600 text-white p-2 rounded shadow"><i data-lucide="edit-2" class="w-3 h-3"></i></button>
                        <button onclick="deleteProject(${p.id}); event.stopPropagation();" class="bg-red-600 text-white p-2 rounded shadow"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                    </div>
                    <div class="h-48 cursor-pointer overflow-hidden" onclick="openModal(${p.id})">
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    <div class="p-5 flex flex-col flex-1 cursor-pointer" onclick="openModal(${p.id})">
                        <div class="text-xs font-bold text-blue-600 uppercase mb-2">${p[currentLang].cat}</div>
                        <h3 class="text-lg font-bold text-slate-900 mb-2">${p[currentLang].title}</h3>
                        <p class="text-slate-500 text-sm line-clamp-2 mb-4">${p[currentLang].short}</p>
                        <div class="mt-auto flex flex-wrap gap-1">
                            ${p.tech.map(t => `<span class="px-2 py-0.5 bg-slate-100 text-slate-500 text-[10px] rounded font-bold">${t}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- GESTION SKILLS ---
        function addSkill() {
            DATA.skills.push({ name: "Nouvelle", level: "Niveau" });
            render();
        }
        function editSkill(idx, key, val) {
            DATA.skills[idx][key] = val;
        }
        function removeSkill(idx) {
            DATA.skills.splice(idx, 1);
            render();
        }

        // --- GESTION PROJETS ---
        function openEditModal(id = null) {
            const p = id ? DATA.projects.find(x => x.id === id) : null;
            document.getElementById('edit-id').value = id || '';
            document.getElementById('edit-title-fr').value = p ? p.fr.title : '';
            document.getElementById('edit-title-en').value = p ? p.en.title : '';
            document.getElementById('edit-image').value = p ? p.image : '';
            document.getElementById('edit-cat-fr').value = p ? p.fr.cat : '';
            document.getElementById('edit-cat-en').value = p ? p.en.cat : '';
            document.getElementById('edit-desc-fr').value = p ? p.fr.desc : '';
            document.getElementById('edit-desc-en').value = p ? p.en.desc : '';
            document.getElementById('edit-tech').value = p ? p.tech.join(', ') : '';
            document.getElementById('edit-modal').classList.remove('hidden');
        }
        function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }
        
        function saveProject() {
            const id = document.getElementById('edit-id').value;
            const newP = {
                id: id ? parseInt(id) : Date.now(),
                image: document.getElementById('edit-image').value,
                tech: document.getElementById('edit-tech').value.split(',').map(s => s.trim()),
                fr: { title: document.getElementById('edit-title-fr').value, cat: document.getElementById('edit-cat-fr').value, desc: document.getElementById('edit-desc-fr').value, short: document.getElementById('edit-desc-fr').value.substring(0, 50) + "..." },
                en: { title: document.getElementById('edit-title-en').value, cat: document.getElementById('edit-cat-en').value, desc: document.getElementById('edit-desc-en').value, short: document.getElementById('edit-desc-en').value.substring(0, 50) + "..." }
            };
            if (id) { const i = DATA.projects.findIndex(x => x.id == id); DATA.projects[i] = newP; }
            else { DATA.projects.push(newP); }
            closeEditModal(); render();
        }

        function deleteProject(id) {
            if(confirm("Supprimer ?")) { DATA.projects = DATA.projects.filter(p => p.id !== id); render(); }
        }

        function openModal(id) {
            const p = DATA.projects.find(x => x.id === id);
            document.getElementById('modal-title').textContent = p[currentLang].title;
            document.getElementById('modal-tag').textContent = p[currentLang].cat;
            document.getElementById('modal-desc').textContent = p[currentLang].desc;
            document.getElementById('modal-image').src = p.image;
            document.getElementById('modal-techs').innerHTML = p.tech.map(t => `<span class="px-2 py-1 bg-blue-50 text-blue-700 rounded text-xs font-bold">${t}</span>`).join('');
            document.getElementById('project-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('project-modal').classList.add('hidden'); }

        function downloadUpdatedHTML() {
            let html = document.documentElement.outerHTML;
            const dataStr = `let DATA = ${JSON.stringify(DATA, null, 4)};`;
            const regex = /let DATA = [\s\S]*?;/;
            html = html.replace(regex, dataStr);
            const blob = new Blob([html], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'portfolio_final.html';
            a.click();
        }

        window.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
