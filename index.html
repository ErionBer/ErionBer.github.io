                            "fr": "__**Description du projet**__\n\nCe projet était sur l'enseigne Leclerc dont leur site e-commerce répertorie les fiches produits par catégorie et par magasin. Dans mon cas, j’ai ciblé la catégorie « surgelés » et extrait les informations disponibles publiquement (prix, produits) pour les magasins de Montluçon, Tours et Châteauroux.",
                            "en": "Project Description\n\nThis project was on the Leclerc brand whose e-commerce site lists the product sheets by category and by store. In my case, I targeted the \"frozen\" category and extracted the publicly available information (prices, products) for the stores in Montluçon, Tours and Châteauroux.",

                            "en": "\n\n__** Data scraping software **__\n\nIn addition, I  also used a scraping extension (Web Scraper) to automatically retrieve the product sheets from the store pages of the Leclerc site. The raw data was then cleaned and structured (management of missing values, correction of the price format) before being exploited to create visualizations and decision-making reports.",

                        {
                            "type": "text",
                            "fr": "__**Etude de marché**__\n\nJ’ai réalisé une étude comparative de la catégorie « surgelés » en ciblant trois magasins Leclerc (Tours, Montluçon, Châteauroux) et en les confrontant aux principales enseignes de la GMS afin d’analyser le positionnement prix, la diversité d’offre et les parts de marché, puis de produire des recommandations opérationnelles exploitables via des dashboards.\n\n- **Méthodologie **: collecte automatisée des fiches produits, nettoyage et harmonisation des prix.\n- **Comparatif **: E.Leclerc, Carrefour, Intermarché, Auchan, Super U, Casino, Cora, Monoprix.\n- **Résultats clés **: Leclerc le moins cher (écarts jusqu’à 25–30 % vs Auchan/Carrefour), gamme la plus large (~500 références), part de marché ~22,7 %.",
                            "en": "Market research\n\nI carried out a comparative study of the \"frozen\" category by targeting three Leclerc stores (Tours, Montluçon, Châteauroux) and comparing them with the main brands of the supermarket in order to analyze the price positioning, the diversity of offer and the market shares, then to produce operational recommendations that can be exploited via dashboards.\n\n- **Methodology **: automated collection of product sheets, cleaning and price harmonization.\n- **Comparative **: E. Leclerc, Carrefour, Intermarché, Auchan, Super U, Casino, Cora, Monoprix.\n- ** Key results **: Least expensive Leclerc (deviations up to 25-30% vs Auchan/Carrefour), widest range (~500 references), market share ~22.7%.",

                            "type": "text",
                            "fr": "__**Description du projet**__\n\nNous avons travaillé sur la problématique : comment identifier et expliquer les évolutions de la déscolarisation chez les 15–29 ans entre 2010 et 2021 ,  en particulier quelles tranches d’âge et quels territoires sont les plus affectés et quels facteurs (économiques, sociaux, formation/professionnalisation) peuvent expliquer ces différences.\n\n**Méthode**\n\nPréparation des données : jeu de données INSEE fourni.\nSélection d’indicateurs : taux de déscolarisation global 15–29 ans, taux par tranche d’âge (15–17 / 18–24 / 25–29), indicateurs territoriaux (taux par département/région)\nAnalyses réalisées : séries temporelles 2010–2021 pour faire des comparaisons, segmentation par tranche d’âge, corrélations simples avec variables socio‑économiques, et identification d’anomalies/points chauds via heatmap (cartes thermiques).\n\n**Principaux enseignements**\n\n- Les profils 18–24 et 25–29 montrent des valeurs différentes (transitions vers le marché du travail ou formations professionnelles).\n- Les facteurs socio‑économiques (emploi local, offres de formation) peuvent expliquer ces écarts .\n\n**Valeur ajoutée et impact**\n\n- Création d’un outil visuel et synthétique (infographie + dashboard) facilitant la prise de décisions et la compréhension des  non‑spécialistes.\n- Amélioration du travail d’équipe :  relectures rapides permettant une marge d'erreur plus faible et une efficacité plus qualitative.",

                            "type": "text",
                            "fr": "__**Description du projet**__\n\nJ’ai extrait, nettoyé et analysé des séries temporelles Eurostat sur le transport aérien pour produire des indicateurs et des prévisions exploitables. Le travail porte notamment sur les flottes et le trafic d’aéronefs (France, Bulgarie et autres séries sélectionnées) et combine analyses descriptives, décomposition saisonnière, nettoyage (tsclean) et modèles de prévision (SES, Holt, Holt‑Winters) avec comparaisons pré‑/post‑COVID.\n\nPoints clés du travail réalisé\n\n- **Source **: uniquement Eurostat (export via l’explorateur de données).\n- **Données traitées** : séries mensuelles et annuelles (trafic, nombre de flottes) ; gestion des NA (tsclean) et transformation logarithmique pour décomposition STL.\n- **Méthodes **: lissage exponentiel simple (SES), Holt (amorti/non amorti), Holt‑Winters, décomposition MSTL, seasonplots pour comparer pré‑COVID / COVID / post‑COVID.\n- **Comparaisons **: France vs Bulgarie (séries, prévisions et trajectoires de reprise); comparaison des prévisions réalisées en 2018/2019 avec la réalité observée jusqu’en 2024.\n- **Prévisions **: horizon multi‑années (36 mois) pour estimer la reprise du trafic et l’évolution des flottes.\n- **Livrables **: scripts R (fpp2/forecast), graphiques temporels et seasonplots, jeux de données nettoyés et visualisations prêtes à intégrer dans un rapport ou une présentation orale.",
                            "en": "I extracted, cleaned and analyzed Eurostat time series on air transport to produce actionable indicators and forecasts, focusing on aircraft fleets and traffic.",
                            "align_text": "left"
                        },

                            "type": "image",

                            "align": "center",
                            "size": "65"
                        },
                        {
                            "type": "text",
                            "fr": "**Nettoyage et préparation**\n\n- Gestion des valeurs manquantes et anomalies : utilisation de tsclean pour détecter et corriger outliers et NA.\n- Transformations : application d’une transformation logarithmique lorsque nécessaire pour stabiliser la variance avant décomposition (STL/MSTL).\n- Fenêtrage pour comparaisons temporelles : constitution de sous‑séries (ex. fenêtre 2010–2018 vs 2019–2021) pour évaluer changements structurels.",

                            "align_text": "left"
                        },

                            "align": "center",
                            "size": "45"
                        },

                            "type": "text",

    <script>
        let currentLang = 'fr';
        let currentProjectImages = [];
        let currentImageIndex = 0;

        function filterProjects() {
            const query = document.getElementById('search-input').value.toLowerCase();
            DATA.projects.forEach(p => {
                const langData = p[currentLang] || {};
                const techStr = Array.isArray(p.tech) ? p.tech.join(' ') : '';
                const searchableText = `${langData.title || ''} ${langData.cat || ''} ${langData.short || ''} ${techStr}`.toLowerCase();
                const card = document.getElementById(`project-card-${p.id}`);
                if(card) card.style.display = searchableText.includes(query) ? 'flex' : 'none';
            });
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
        }
        
        function switchTab(tabName) {
            ['projects', 'skills', 'profile'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.remove('active');
            });
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            document.getElementById(`btn-${tabName}`).classList.add('active');
            if(tabName === 'projects') hideProjectDetails();
        }

        function parseBasicMarkdown(text) {
            if (!text) return "";
            let parsed = text;
            
            parsed = parsed.replace(/(?:^|\n)((?:\|.*\|\n?)+)/g, function(match) {
                let rows = match.trim().split('\n');
                let html = '<div class="overflow-x-auto my-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm"><table class="min-w-full divide-y divide-slate-200 dark:divide-slate-700 text-sm text-left">';
                
                rows.forEach((row, i) => {
                    let cells = row.split('|').filter((c, idx, arr) => idx !== 0 && idx !== arr.length - 1);
                    if (i === 1 && cells.every(c => c.trim().match(/^[-:]+$/))) return; 
                    
                    if (i === 0) {
                        html += '<thead class="bg-slate-50 dark:bg-slate-800/50"><tr>';
                        cells.forEach(c => html += `<th class="px-4 py-3 font-semibold text-slate-900 dark:text-white uppercase tracking-wider text-xs">${c.trim()}</th>`);
                        html += '</tr></thead><tbody class="divide-y divide-slate-200 dark:divide-slate-700 bg-white dark:bg-slate-900">';
                    } else {
                        html += '<tr>';
                        cells.forEach(c => html += `<td class="px-4 py-3 text-slate-600 dark:text-slate-300">${c.trim()}</td>`);
                        html += '</tr>';
                    }
                });
                html += '</tbody></table></div>';
                return html;
            });

            parsed = parsed
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/__(.*?)__/g, '<u>$1</u>')
                .replace(/`(.*?)`/g, '<code class="bg-slate-100 dark:bg-slate-800 text-pink-500 px-1 rounded">$1</code>');
                
            parsed = parsed.replace(/(?:\n|^)(?:-\s+.*\n?)+/gm, function(match) {
                let items = match.trim().split('\n').map(line => {
                    if(!line.trim()) return '';
                    return `<li class="pl-1">${line.replace(/^-\s+/, '').trim()}</li>`
                }).join('');
                return `\n<ul class="list-disc list-outside pl-5 my-4 marker:text-indigo-500 space-y-2">${items}</ul>\n`;
            });
            
            return parsed;
        }

        function switchCodeTab(index) {
            document.querySelectorAll('.code-tab-btn').forEach((tab, i) => {
                if(i === index) { 
                    tab.classList.add('bg-[#0d1117]', 'text-emerald-400', 'border-emerald-500'); 
                    tab.classList.remove('bg-transparent', 'text-slate-500', 'border-transparent', 'hover:text-slate-300'); 
                } else { 
                    tab.classList.remove('bg-[#0d1117]', 'text-emerald-400', 'border-emerald-500'); 
                    tab.classList.add('bg-transparent', 'text-slate-500', 'border-transparent', 'hover:text-slate-300'); 
                }
            });
            const pId = document.getElementById('project-detail-view').dataset.currentProject;
            if (pId) {
                const p = DATA.projects.find(x => x.id == pId);
                if (p && p.codeSnippets && p.codeSnippets[index]) {
                    document.getElementById('detail-code-content').textContent = p.codeSnippets[index].code;
                }
            }
        }

        function updateGalleryView() {
            const mainImg = document.getElementById('detail-main-image');
            if(currentProjectImages.length > 0) { 
                mainImg.style.opacity = 0; 
                setTimeout(() => { 
                    mainImg.src = currentProjectImages[currentImageIndex]; 
                    mainImg.style.opacity = 1; 
                }, 150); 
            }
            const showControls = currentProjectImages.length > 1;
            document.getElementById('gallery-prev-btn').style.display = showControls ? 'block' : 'none';
            document.getElementById('gallery-next-btn').style.display = showControls ? 'block' : 'none';
            const ind = document.getElementById('gallery-indicator');
            if(showControls) { 
                ind.classList.remove('hidden'); 
                ind.textContent = `${currentImageIndex + 1} / ${currentProjectImages.length}`; 
            } else { 
                ind.classList.add('hidden'); 
            }
        }

        function prevImage() { 
            if(currentProjectImages.length <= 1) return; 
            currentImageIndex = (currentImageIndex - 1 + currentProjectImages.length) % currentProjectImages.length; 
            updateGalleryView(); 
        }

        function nextImage() { 
            if(currentProjectImages.length <= 1) return; 
            currentImageIndex = (currentImageIndex + 1) % currentProjectImages.length; 
            updateGalleryView(); 
        }

        function openLightbox() {
            const mainImg = document.getElementById('detail-main-image');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            if (mainImg.src) {
                lightboxImg.src = mainImg.src;
                lightbox.classList.remove('hidden');
                lightbox.classList.add('flex');
            }
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.add('hidden');
            lightbox.classList.remove('flex');
        }

        function showProjectDetails(id) {
            const p = DATA.projects.find(x => x.id === id);
            if(!p) return;
            
            document.getElementById('project-detail-view').dataset.currentProject = id;
            const langData = p[currentLang] || {};
            
            document.getElementById('detail-title').textContent = langData.title || '';
            
            const blocksContainer = document.getElementById('detail-blocks-container');
            blocksContainer.className = "clearfix w-full"; 
            let htmlBlocks = "";
            
            let blocksToRender = p.blocks || [];

            blocksToRender.forEach(b => {
                if (b.type === 'text') {
                    const txt = (currentLang === 'en' && b.en && b.en.trim() !== '') ? b.en : (b.fr || '');
                    const textAlignClass = b.align_text ? `text-${b.align_text}` : 'text-left';
                    htmlBlocks += `<div class="mb-5 whitespace-pre-line text-base leading-relaxed text-slate-700 dark:text-slate-300 clear-none ${textAlignClass}">${parseBasicMarkdown(txt)}</div>`;
                } else if (b.type === 'image' && b.url) {
                    let alignVal = b.align || 'center';
                    let sizeVal = b.size || '100';
                    let wrapperClass = "my-6 mx-auto block clear-both"; 
                    if (alignVal === 'left') wrapperClass = "float-left mr-6 mb-4 mt-1 clear-none";
                    if (alignVal === 'right') wrapperClass = "float-right ml-6 mb-4 mt-1 clear-none";
                    htmlBlocks += `
                    <div class="${wrapperClass}" style="width: ${sizeVal}%;">
                        <img src="${b.url}" class="w-full rounded-xl shadow-md border border-slate-200 dark:border-slate-700" loading="lazy">
                    </div>`;
                } else if (b.type === 'table') {
                    const data = currentLang === 'fr' ? b.data_fr : b.data_en;
                    if (data && data.length > 0) {
                        htmlBlocks += `<div class="overflow-x-auto my-6 clear-both"><table class="min-w-full divide-y divide-slate-200 dark:divide-slate-700 text-sm text-left border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm">`;
                        data.forEach((row, r) => {
                            if (r === 0) {
                                htmlBlocks += '<thead class="bg-slate-50 dark:bg-slate-800/50"><tr>';
                                row.forEach(c => htmlBlocks += `<th class="px-4 py-3 font-bold text-slate-900 dark:text-white border-b border-slate-200 dark:border-slate-700">${parseBasicMarkdown(c)}</th>`);
                                htmlBlocks += '</tr></thead><tbody class="divide-y divide-slate-200 dark:divide-slate-700 bg-white dark:bg-slate-900">';
                            } else {
                                htmlBlocks += '<tr>';
                                row.forEach(c => htmlBlocks += `<td class="px-4 py-3 text-slate-600 dark:text-slate-300">${parseBasicMarkdown(c)}</td>`);
                                htmlBlocks += '</tr>';
                            }
                        });
                        htmlBlocks += '</tbody></table></div>';
                    }
                }
            });
            
            htmlBlocks += `<div style="clear: both;"></div>`;
            blocksContainer.innerHTML = htmlBlocks;

            document.getElementById('detail-tag-container').innerHTML = `<span class="text-xs font-bold text-indigo-600 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1 rounded-md uppercase">${langData.cat || ''}</span>`;
            
            const galleryContainer = document.getElementById('detail-gallery-container');
            const mainImg = document.getElementById('detail-main-image');
            const imagesArray = p.images || [];
            
            if (imagesArray.length === 0) { 
                galleryContainer.classList.add('hidden'); 
            } else { 
                galleryContainer.classList.remove('hidden'); 
                mainImg.src = imagesArray[0];
            }
            
            document.getElementById('detail-techs').innerHTML = (p.tech || []).map(t => `<span class="px-4 py-1.5 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 rounded-lg text-sm font-bold shadow-sm border border-slate-200 dark:border-slate-700">${t}</span>`).join('');
            
            const btnDemo = document.getElementById('detail-btn-demo');
            const btnCode = document.getElementById('detail-btn-code');
            const buttonsContainer = document.getElementById('detail-buttons');
            let hasButtons = false;

            if (p.linkDemo && p.linkDemo !== '#') { btnDemo.href = p.linkDemo; btnDemo.style.display = 'flex'; hasButtons = true; } else { btnDemo.style.display = 'none'; }
            if (p.linkCode && p.linkCode !== '#') { btnCode.href = p.linkCode; btnCode.style.display = 'flex'; hasButtons = true; } else { btnCode.style.display = 'none'; }
            buttonsContainer.style.display = hasButtons ? 'flex' : 'none';

            // GESTION DU CODE SOURCE
            const codeContainer = document.getElementById('detail-code-container');
            const tabsContainer = document.getElementById('detail-code-tabs');
            
            if (p.codeSnippets && p.codeSnippets.length > 0) {
                codeContainer.classList.remove('hidden'); 
                codeContainer.classList.add('flex');
                tabsContainer.innerHTML = p.codeSnippets.map((snip, index) => 
                    `<button onclick="switchCodeTab(${index})" class="code-tab-btn px-5 py-3 text-xs font-mono border-t-2 border-transparent transition-all outline-none rounded-t-lg mt-1"><i data-lucide="file-code-2" class="w-4 h-4 inline-block mr-1.5 align-text-bottom"></i> ${snip.title}</button>`
                ).join('');
                switchCodeTab(0); // Affiche le premier
            } else { 
                codeContainer.classList.add('hidden'); 
                codeContainer.classList.remove('flex'); 
                tabsContainer.innerHTML = ''; 
            }

            document.getElementById('projects-header').classList.add('hidden');
            document.getElementById('projects-grid').classList.add('hidden');
            document.getElementById('project-detail-view').classList.remove('hidden');
            
            if (window.lucide) { lucide.createIcons(); }
        }

        function hideProjectDetails() {
            document.getElementById('project-detail-view').classList.add('hidden');
            document.getElementById('projects-header').classList.remove('hidden');
            document.getElementById('projects-grid').classList.remove('hidden');
        }

        function toggleLang() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            document.getElementById('lang-label').textContent = currentLang === 'fr' ? 'EN' : 'FR';
            render();
            filterProjects();
            
            if (!document.getElementById('project-detail-view').classList.contains('hidden')) {
                const pId = document.getElementById('project-detail-view').dataset.currentProject;
                if (pId) showProjectDetails(parseInt(pId));
            }
        }

        function render() {
            // Textes statiques
            document.querySelectorAll('[data-i18n]').forEach(el => {
                if(i18n && i18n[currentLang] && i18n[currentLang][el.dataset.i18n]) {
                    el.textContent = i18n[currentLang][el.dataset.i18n];
                }
            });

            // Profil
            document.getElementById('nav-name').textContent = DATA.info.name;
            document.getElementById('profile-name-large').textContent = DATA.info.name;
            
            const currentTitle = currentLang === 'fr' ? DATA.info.fr?.title : DATA.info.en?.title;
            const currentBio = currentLang === 'fr' ? DATA.info.fr?.bio : DATA.info.en?.bio;
            
            document.getElementById('profile-role-large').textContent = currentTitle || "";
            document.getElementById('profile-bio-large').innerHTML = currentBio ? parseBasicMarkdown(currentBio) : "";
            document.getElementById('profile-img-large').src = DATA.info.photo;
            
            // Liens
            const emailBtn = document.getElementById('profile-email-btn');
            if (emailBtn) {
                emailBtn.innerHTML = `<i data-lucide="mail" class="w-4 h-4"></i> <span>${currentLang === 'fr' ? 'Me contacter' : 'Contact Me'}</span>`;
                emailBtn.href = `mailto:${DATA.info.email}`;
            }
            
            const lnkBtn = document.getElementById('profile-linkedin');
            if (lnkBtn) {
                if (DATA.info.linkedin && DATA.info.linkedin !== '#' && DATA.info.linkedin.trim() !== '') {
                    lnkBtn.href = DATA.info.linkedin;
                    lnkBtn.innerHTML = `<i data-lucide="linkedin" class="w-5 h-5 sm:w-4 sm:h-4"></i> <span class="hidden sm:inline">LinkedIn</span>`;
                    lnkBtn.style.display = 'flex';
                } else {
                    lnkBtn.style.display = 'none';
                }
            }

            const cvBtn = document.getElementById('profile-cv');
            if (cvBtn) {
                const cvHref = (currentLang === 'fr' ? DATA.info.fr?.cvPdf : DATA.info.en?.cvPdf);
                if (cvHref && cvHref !== '#' && cvHref.trim() !== '') {
                    cvBtn.href = cvHref;
                    cvBtn.innerHTML = `<i data-lucide="file-text" class="w-5 h-5 sm:w-4 sm:h-4"></i> <span class="hidden sm:inline">${currentLang === 'fr' ? 'Mon CV' : 'My CV'}</span>`;
                    cvBtn.style.display = 'flex';
                } else {
                    cvBtn.style.display = 'none';
                }
            }

            // Compétences
            const renderItem = (s) => {
                const langData = s[currentLang] || {};
                let bgColor, nameColor, levelColor;
                if (s.type === 'tool') { bgColor = 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800/50 border-l-4 border-l-emerald-500'; nameColor = 'text-emerald-900 dark:text-emerald-100'; levelColor = 'text-emerald-700 dark:text-emerald-400'; } 
                else if (s.type === 'soft') { bgColor = 'bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-800/50 border-l-4 border-l-amber-500'; nameColor = 'text-amber-900 dark:text-amber-100'; levelColor = 'text-amber-700 dark:text-amber-400'; } 
                else { bgColor = 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800/50 border-l-4 border-l-blue-500'; nameColor = 'text-blue-900 dark:text-blue-100'; levelColor = 'text-blue-700 dark:text-blue-400'; }

                return `
                <div class="px-4 py-3 ${bgColor} border rounded-xl flex items-center justify-between group relative transition-transform hover:-translate-y-1 hover:shadow-lg">
                    <div class="flex flex-col w-full">
                        <span class="font-bold ${nameColor}">${langData.name || ""}</span>
                        <span class="text-xs ${levelColor} uppercase font-black tracking-widest mt-1">${langData.level || ""}</span>
                    </div>
                </div>
                `;
            };

            document.getElementById('skills-list').innerHTML = (DATA.skills || []).filter(s => s.type === 'skill' || !s.type).map(renderItem).join('');
            document.getElementById('tools-list').innerHTML = (DATA.skills || []).filter(s => s.type === 'tool').map(renderItem).join('');
            document.getElementById('soft-list').innerHTML = (DATA.skills || []).filter(s => s.type === 'soft').map(renderItem).join('');

            // Grille de projets
            document.getElementById('projects-grid').innerHTML = (DATA.projects || []).map(p => {
                const langData = p[currentLang] || {};
                const imagesArray = p.images || [];
                const coverImage = imagesArray.length > 0 ? imagesArray[0] : 'https://via.placeholder.com/800x400?text=Data+Project';
                
                let finalShort = langData.short || "";
                if (!finalShort && p.blocks && p.blocks.length > 0) {
                    const firstText = p.blocks.find(b => b.type === 'text');
                    if (firstText) {
                        const t = currentLang === 'fr' ? firstText.fr : firstText.en;
                        if (t) finalShort = t.substring(0, 100) + "...";
                    }
                }

                const techArray = p.tech || [];

                return `
                <div id="project-card-${p.id}" class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm hover:shadow-xl dark:shadow-none hover:border-indigo-200 dark:hover:border-indigo-800 transition-all duration-300 overflow-hidden flex flex-col relative group transform hover:-translate-y-1">
                    <div class="h-52 cursor-pointer overflow-hidden bg-slate-50 dark:bg-slate-950 relative flex items-center justify-center p-4 border-b border-slate-100 dark:border-slate-800" onclick="showProjectDetails(${p.id})">
                        <img src="${coverImage}" class="max-w-full max-h-full object-contain group-hover:scale-105 transition duration-500 drop-shadow-md rounded-lg" loading="lazy">
                    </div>
                    <div class="p-6 flex flex-col flex-1 cursor-pointer bg-gradient-to-b from-transparent to-slate-50/50 dark:to-slate-900/50" onclick="showProjectDetails(${p.id})">
                        <div class="text-[10px] font-bold text-indigo-600 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-900/30 px-2 py-1 rounded-md uppercase tracking-wider w-fit mb-4 border border-indigo-100 dark:border-indigo-800">${langData.cat || ''}</div>
                        <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition">${langData.title || ''}</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-sm line-clamp-2 mb-5 leading-relaxed">${parseBasicMarkdown(finalShort).replace(/<[^>]*>?/gm, '')}</p>
                        <div class="mt-auto flex flex-wrap gap-1.5">
                            ${techArray.slice(0,4).map(t => `<span class="px-2 py-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-[11px] rounded-md font-bold">${t}</span>`).join('')}
                            ${techArray.length > 4 ? `<span class="px-2 py-1 bg-slate-100 dark:bg-slate-800 text-slate-400 text-[11px] rounded-md font-bold">+${techArray.length - 4}</span>` : ''}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
            
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
